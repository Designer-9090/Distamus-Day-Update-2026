<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Control DDU 2026 — [ENCRIPTADO]</title>
    <link rel="icon" type="image/webp" href="distamuslogo.webp">
    
    <style>
      /* Retro terminal styling */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: #000000;
        color: #00ff66;
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        height: 100vh;
        overflow: hidden;
        padding: 2rem;
        position: relative;
      }
      
      /* CRT scanline effect */
      body::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
      }
      
      /* Screen flicker */
      body::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: rgba(18, 16, 16, 0.1);
        opacity: 0;
        z-index: 99;
        pointer-events: none;
        animation: flicker 0.15s infinite;
      }
      
      @keyframes flicker {
        0% { opacity: 0.15; }
        50% { opacity: 0.1; }
        100% { opacity: 0.15; }
      }
      
      .terminal-container {
        border: 1px solid #00ff66;
        border-radius: 8px;
        height: 100%;
        padding: 2rem;
        background: rgba(0, 5, 0, 0.95);
        box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow-y: auto;
      }
      
      .terminal-header {
        border-bottom: 1px solid rgba(0, 255, 102, 0.3);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
      }
      
      .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .dot {
        width: 8px;
        height: 8px;
        background-color: #00ff66;
        border-radius: 50%;
        box-shadow: 0 0 8px #00ff66;
        animation: pulse 1s infinite alternate;
      }
      
      @keyframes pulse {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
      }
      
      .terminal-content {
        flex-grow: 1;
        font-size: 0.95rem;
        line-height: 1.6;
        text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
      }
      
      .code-line {
        margin-bottom: 0.75rem;
        opacity: 0;
        transform: translateY(5px);
        animation: showLine 0.4s forwards;
      }
      
      @keyframes showLine {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .highlight {
        color: #ffffff;
        background-color: rgba(0, 255, 102, 0.2);
        padding: 2px 6px;
        border-radius: 4px;
      }
      
      .accent-blue {
        color: #00e5ff;
        text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
      }
      
      .accent-warn {
        color: #ffcc00;
        text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
      }
      
      .cursor {
        display: inline-block;
        width: 8px;
        height: 15px;
        background-color: #00ff66;
        margin-left: 5px;
        animation: blink 0.8s infinite;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      
      .terminal-footer {
        margin-top: 2rem;
        border-top: 1px solid rgba(0, 255, 102, 0.3);
        padding-top: 1.5rem;
        display: flex;
        justify-content: flex-start;
      }
      
      .btn-terminal {
        background: transparent;
        border: 1px solid #00ff66;
        color: #00ff66;
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        padding: 0.75rem 1.5rem;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      
      .btn-terminal:hover {
        background-color: #00ff66;
        color: #000000;
        box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        transform: translateY(-2px);
      }
      
      /* Hide standard scrollbars */
      .terminal-container::-webkit-scrollbar {
        width: 6px;
      }
      .terminal-container::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.3);
      }
      .terminal-container::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 102, 0.3);
        border-radius: 3px;
      }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">
            <div>DESKTOP-SECURE::CORE-ACCESS // PORT: 54180</div>
            <div class="status-indicator">
                <span class="dot"></span>
                <span>ONLINE - SECURE DATABASE</span>
            </div>
        </div>

        <div class="terminal-content" id="logContent">
            <!-- Programmatically typed lines will appear here -->
        </div>

        <div class="terminal-footer">
            <a href="next-chapter.html" class="btn-terminal">
                <span>[ ]</span> run command: exit_to_portal.sh
            </a>
        </div>
    </div>

    <script>
        const logs = [
            { text: "[INIT] INITIALIZING SECUR-CORE BOOT LOADER v5.2.0...", delay: 200, type: "normal" },
            { text: "[INIT] RUNNING PORT HANDSHAKE WITH CLOUDFLARE NODE-7...", delay: 400, type: "normal" },
            { text: "[INIT] SECURE ENCRYPTED TUNNEL ESTABLISHED.", delay: 300, type: "normal" },
            { text: "[AUTH] ACCEDIDA BASE DE DATOS SECRETA DESDE /next-chapter.", delay: 400, type: "normal" },
            { text: "[AUTH] DECRYPTING BLOCK DDU_2026_CHAPTER_LOGS...", delay: 600, type: "normal" },
            { text: "==================================================================", delay: 200, type: "normal" },
            { text: "   PROYECTO: DDU 2026 (THE NEXT CHAPTER BEGINS)", delay: 300, type: "blue" },
            { text: "   ESTADO: PREPARACIÓN DE LANZAMIENTO", delay: 200, type: "blue" },
            { text: "==================================================================", delay: 100, type: "normal" },
            { text: "[REGISTRO #0710-A] PLANES DE DESPLIEGUE CONFIRMADOS:", delay: 400, type: "normal" },
            { text: "\"El evento se ha pospuesto oficialmente al 10 de julio de 2026 a las 16:00 UTC. La cuenta atrás y las invitaciones de calendario de Google han sido sincronizadas en el landing.\"", delay: 600, type: "normal" },
            { text: "\"La sección de blogs especiales servirá para publicar análisis profundos de Edu v3, Time v2.5 e interfaces de usuario una vez finalizada la presentación principal.\"", delay: 600, type: "normal" },
            { text: "------------------------------------------------------------------", delay: 200, type: "normal" },
            { text: "[LOGÍSTICA] ANOTACIÓN INTERNA DEL CEO:", delay: 400, type: "warn" },
            { text: "\"Distamus Update fue el primer nombre sugerido, pero para añadir más intriga y asegurar que representa el mejor día en la historia del ecosistema, he cambiado el nombre a Distamus Day Update.\"", delay: 700, type: "normal" },
            { text: "------------------------------------------------------------------", delay: 200, type: "normal" },
            { text: "[CONECTIVIDAD] INFRAESTRUCTURA DE COMUNIDAD:", delay: 400, type: "warn" },
            { text: "\"El botón del servidor oficial de Discord permanecerá bloqueado en los portales hasta garantizar la escalabilidad de la moderación. Programado para habilitarse progresivamente tras Edu v3.\"", delay: 700, type: "normal" },
            { text: "------------------------------------------------------------------", delay: 200, type: "normal" },
            { text: "[STATUS] TERMINAL ABIERTA - ACCESO CONCEDIDO A DESARROLLADOR.", delay: 300, type: "normal" },
            { text: "Listo para recibir instrucciones de núcleo.", delay: 200, type: "normal" }
        ];

        const logContainer = document.getElementById('logContent');

        function appendLine(index) {
            if (index >= logs.length) {
                // Add blinking cursor at the end
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor';
                logContainer.appendChild(cursorSpan);
                return;
            }

            const item = logs[index];
            const div = document.createElement('div');
            div.className = 'code-line';
            
            if (item.type === "blue") {
                div.className += ' accent-blue';
            } else if (item.type === "warn") {
                div.className += ' accent-warn';
            }

            div.innerHTML = item.text.replace(
                /\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>'
            ).replace(
                /\`\`(.*?)\`\`/g, '<code>$1</code>'
            );

            logContainer.appendChild(div);
            
            // Auto scroll to bottom
            const container = logContainer.parentElement;
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                appendLine(index + 1);
            }, item.delay);
        }

        // Start typing simulation after 500ms
        setTimeout(() => {
            appendLine(0);
        }, 500);
    </script>
</body>
</html>
