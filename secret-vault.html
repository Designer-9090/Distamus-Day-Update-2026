<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Control DDU 2026 — [ENCRIPTADO]</title>
    <link rel="icon" type="image/webp" href="distamuslogo.webp">
    
    <style>
      /* Retro terminal styling */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: #000000;
        color: #00ff66;
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        height: 100vh;
        overflow: hidden;
        padding: 2rem;
        position: relative;
      }
      
      /* CRT scanline effect */
      body::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 100;
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
      }
      
      /* Screen flicker */
      body::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: rgba(18, 16, 16, 0.1);
        opacity: 0;
        z-index: 99;
        pointer-events: none;
        animation: flicker 0.15s infinite;
      }
      
      @keyframes flicker {
        0% { opacity: 0.15; }
        50% { opacity: 0.1; }
        100% { opacity: 0.15; }
      }
      
      .terminal-container {
        border: 1px solid #00ff66;
        border-radius: 8px;
        height: 100%;
        padding: 2rem;
        background: rgba(0, 5, 0, 0.95);
        box-shadow: 0 0 30px rgba(0, 255, 102, 0.15);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow-y: auto;
      }
      
      .terminal-header {
        border-bottom: 1px solid rgba(0, 255, 102, 0.3);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
      }
      
      .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .dot {
        width: 8px;
        height: 8px;
        background-color: #00ff66;
        border-radius: 50%;
        box-shadow: 0 0 8px #00ff66;
        animation: pulse 1s infinite alternate;
      }
      
      @keyframes pulse {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
      }
      
      .terminal-content {
        flex-grow: 1;
        font-size: 0.95rem;
        line-height: 1.6;
        text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
      }
      
      .code-line {
        margin-bottom: 0.5rem;
        opacity: 0;
        transform: translateY(5px);
        animation: showLine 0.3s forwards;
      }
      
      @keyframes showLine {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .highlight {
        color: #ffffff;
        background-color: rgba(0, 255, 102, 0.2);
        padding: 2px 6px;
        border-radius: 4px;
      }
      
      .accent-blue {
        color: #00e5ff;
        text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
      }
      
      .accent-warn {
        color: #ffcc00;
        text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
      }
      
      .cursor {
        display: inline-block;
        width: 8px;
        height: 15px;
        background-color: #00ff66;
        margin-left: 5px;
        animation: blink 0.8s infinite;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      
      .terminal-footer {
        margin-top: 1.5rem;
        border-top: 1px solid rgba(0, 255, 102, 0.3);
        padding-top: 1rem;
        display: flex;
        justify-content: flex-start;
      }
      
      .btn-terminal {
        background: transparent;
        border: 1px solid #00ff66;
        color: #00ff66;
        font-family: 'Fira Code', monospace;
        font-size: 0.9rem;
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      
      .btn-terminal:hover {
        background-color: #00ff66;
        color: #000000;
        box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        transform: translateY(-2px);
      }
      
      .prompt-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 1rem;
        color: #00e5ff;
        text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
      }
      
      .prompt-input {
        background: transparent;
        border: none;
        outline: none;
        color: #00ff66;
        font-family: 'Fira Code', monospace;
        font-size: 0.95rem;
        flex-grow: 1;
        caret-color: #00ff66;
        text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
      }

      /* Hide standard scrollbars */
      .terminal-container::-webkit-scrollbar {
        width: 6px;
      }
      .terminal-container::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.3);
      }
      .terminal-container::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 102, 0.3);
        border-radius: 3px;
      }
    </style>
</head>
<body onclick="focusPrompt()">

    <div class="terminal-container">
        <div class="terminal-header">
            <div>ESCRITORIO-SEGURO::ACCESO-NUCLEO // PUERTO: 54180</div>
            <div class="status-indicator">
                <span class="dot"></span>
                <span>EN LÍNEA - BASE DE DATOS SEGURA</span>
            </div>
        </div>

        <div class="terminal-content" id="logContent">
            <!-- Programmatically typed lines will appear here -->
        </div>

        <div class="prompt-line" id="promptContainer" style="display: none;">
            <span>invitado@distamus:~$</span>
            <input type="text" id="terminalInput" class="prompt-input" autocomplete="off" spellcheck="false">
        </div>

        <div class="terminal-footer">
            <a href="next-chapter.html" class="btn-terminal">
                <span>[ ]</span> ejecutar comando: salir_al_portal.sh
            </a>
        </div>
    </div>

    <script>
        const logs = [
            { text: "[S]ISTEMA SEGURO: PROTOCOLO DE INICIALIZACIÓN INICIADO...", delay: 200, type: "normal" },
            { text: "[P]UERTO ENLAZADO Y ESTABILIZADO EN NODO ENCRIPTADO...", delay: 350, type: "normal" },
            { text: "[A]CCEDIENDO A REGISTROS DE DESARROLLO ARCHIVADOS PARA DDU 2026...", delay: 400, type: "normal" },
            { text: "[C]ONTROL DE DATOS: EMPEZANDO EL DESCIFRADO DEL SISTEMA...", delay: 400, type: "normal" },
            { text: "[E]NTRADA DE FLUJO DE DATOS ENCRIPTADOS COMPLETADA CON ÉXITO.", delay: 200, type: "normal" },
            { text: "==================================================================", delay: 100, type: "normal" },
            { text: "   REGISTROS DE DISEÑO Y AMBIENTACIÓN PARA DDU 2026", delay: 250, type: "blue" },
            { text: "   ESTADO: CLASIFICADO - EXCLUSIVO PARA DESARROLLO", delay: 200, type: "blue" },
            { text: "==================================================================", delay: 100, type: "normal" },
            { text: "[INSTRUCCIONES DE USO DE LA TERMINAL]", delay: 300, type: "warn" },
            { text: "Escribe comandos en la línea de comando inferior y pulsa ENTER:", delay: 200, type: "normal" },
            { text: "  - 'ayuda'       : Muestra la lista de comandos disponibles.", delay: 150, type: "normal" },
            { text: "  - 'pistas'      : Muestra las pistas de diseño del evento.", delay: 150, type: "normal" },
            { text: "  - 'relojes'     : Muestra los relojes analógicos de coordenadas temporales.", delay: 150, type: "normal" },
            { text: "  - 'clave [pal]' : Prueba si [pal] es la palabra secreta (ej. 'clave hola').", delay: 150, type: "normal" },
            { text: "  - 'salir'       : Regresa al portal de blogs.", delay: 150, type: "normal" },
            { text: "  - 'limpiar'     : Limpia la pantalla de la terminal.", delay: 150, type: "normal" },
            { text: "==================================================================", delay: 100, type: "normal" }
        ];

        const logContainer = document.getElementById('logContent');
        const promptContainer = document.getElementById('promptContainer');
        const terminalInput = document.getElementById('terminalInput');

        function appendLine(index) {
            if (index >= logs.length) {
                // Show prompt line
                promptContainer.style.display = 'flex';
                terminalInput.focus();
                return;
            }

            const item = logs[index];
            const div = document.createElement('div');
            div.className = 'code-line';
            
            if (item.type === "blue") {
                div.className += ' accent-blue';
            } else if (item.type === "warn") {
                div.className += ' accent-warn';
            }

            div.innerHTML = item.text;
            logContainer.appendChild(div);
            
            // Auto scroll to bottom
            const container = logContainer.parentElement;
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                appendLine(index + 1);
            }, item.delay);
        }

        // Start typing simulation
        setTimeout(() => {
            appendLine(0);
        }, 500);

        function focusPrompt() {
            if (promptContainer.style.display === 'flex') {
                terminalInput.focus();
            }
        }

        // Terminal command processor
        terminalInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const rawVal = terminalInput.value;
                const cleanVal = rawVal.trim();
                terminalInput.value = '';

                if (cleanVal === '') return;

                // Echo typed command
                const echoDiv = document.createElement('div');
                echoDiv.style.color = '#00e5ff';
                echoDiv.style.margin = '0.5rem 0';
                echoDiv.innerHTML = `invitado@distamus:~$ <span style="color: #ffffff;">${rawVal}</span>`;
                logContainer.appendChild(echoDiv);

                // Parse command
                const parts = cleanVal.split(' ');
                const command = parts[0].toLowerCase();
                const arg = parts.slice(1).join(' ');

                const responseDiv = document.createElement('div');
                responseDiv.style.margin = '0.5rem 0 1rem 0';

                switch(command) {
                    case 'ayuda':
                        responseDiv.innerHTML = `
                            <div style="color: #00ff66;">Comandos disponibles:</div>
                            <div style="margin-left: 1rem;">
                                <div><span style="color: #00e5ff;">ayuda</span>        - Muestra esta lista de comandos.</div>
                                <div><span style="color: #00e5ff;">pistas</span>       - Muestra las pistas del evento y el acertijo.</div>
                                <div><span style="color: #00e5ff;">relojes</span>      - Muestra los relojes analógicos de coordenadas.</div>
                                <div><span style="color: #00e5ff;">clave [pal]</span>  - Prueba si [pal] es la palabra secreta (ej. 'clave hola').</div>
                                <div><span style="color: #00e5ff;">limpiar</span>     - Limpia la pantalla.</div>
                                <div><span style="color: #00e5ff;">salir</span>       - Regresa al portal de blogs.</div>
                            </div>
                        `;
                        break;
                    case 'pistas':
                        responseDiv.innerHTML = `
                            <div style="color: #ffcc00; font-weight: bold;">[PISTAS DE DISEÑO DESCIFRADAS]</div>
                            <div style="margin: 0.5rem 0 0.5rem 1rem; line-height: 1.6;">
                                <div>1. <span style="color: #00e5ff;">Acertijo:</span> Clave de 5 letras. Representa la última frontera, el vacío absoluto entre estrellas, planetas y nebulosas. Es el escenario central de nuestro concepto visual oscuro.</div>
                                <div>2. <span style="color: #00e5ff;">Código Morse:</span> ...  .--.  .-  -.-.  .</div>
                                <div>3. <span style="color: #00e5ff;">Código Binario:</span> 01010011 01110000 01100001 01100011 01100101</div>
                                <div>4. <span style="color: #00e5ff;">Acróstico:</span> Combina las iniciales de la carga del protocolo del sistema.</div>
                            </div>
                        `;
                        break;
                    case 'relojes':
                        responseDiv.innerHTML = `
                            <div style="color: #00e5ff;">[INFO] Cargando relojes analógicos de coordenadas temporales...</div>
                            <div style="display: flex; gap: 2rem; margin: 1.5rem 0; flex-wrap: wrap;">
                                <div style="text-align: center; border: 1px solid rgba(0, 255, 102, 0.3); padding: 1.5rem; border-radius: 6px; background: rgba(0, 10, 0, 0.6); box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);">
                                    <svg width="120" height="120" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 8px rgba(0, 255, 102, 0.8));">
                                        <circle cx="50" cy="50" r="45" stroke="#00ff66" stroke-width="2.5" fill="none" />
                                        <line x1="50" y1="8" x2="50" y2="12" stroke="#00ff66" stroke-width="2" />
                                        <line x1="50" y1="92" x2="50" y2="88" stroke="#00ff66" stroke-width="2" />
                                        <line x1="8" y1="50" x2="12" y2="50" stroke="#00ff66" stroke-width="2" />
                                        <line x1="92" y1="50" x2="88" y2="50" stroke="#00ff66" stroke-width="2" />
                                        <!-- Hour hand at 4 o'clock (120 deg) -->
                                        <line x1="50" y1="50" x2="50" y2="28" stroke="#00ff66" stroke-width="3.5" stroke-linecap="round" transform="rotate(120, 50, 50)" />
                                        <!-- Minute hand at 12 (0 deg) -->
                                        <line x1="50" y1="50" x2="50" y2="18" stroke="#00ff66" stroke-width="2" stroke-linecap="round" transform="rotate(0, 50, 50)" />
                                        <circle cx="50" cy="50" r="4" fill="#00ff66" />
                                    </svg>
                                    <div style="font-size: 0.85rem; margin-top: 10px; color: #00e5ff; font-weight: 600;">COORDENADA ALPHA</div>
                                    <div style="font-size: 0.75rem; color: #00ff66; opacity: 0.8; margin-top: 2px;">Hora del Evento (16:00 UTC)</div>
                                </div>
                                <div style="text-align: center; border: 1px solid rgba(0, 255, 102, 0.3); padding: 1.5rem; border-radius: 6px; background: rgba(0, 10, 0, 0.6); box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);">
                                    <svg width="120" height="120" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 8px rgba(0, 255, 102, 0.8));">
                                        <circle cx="50" cy="50" r="45" stroke="#00ff66" stroke-width="2.5" fill="none" />
                                        <line x1="50" y1="8" x2="50" y2="12" stroke="#00ff66" stroke-width="2" />
                                        <line x1="50" y1="92" x2="50" y2="88" stroke="#00ff66" stroke-width="2" />
                                        <line x1="8" y1="50" x2="12" y2="50" stroke="#00ff66" stroke-width="2" />
                                        <line x1="92" y1="50" x2="88" y2="50" stroke="#00ff66" stroke-width="2" />
                                        <!-- Hour hand at 7 (210 deg) -->
                                        <line x1="50" y1="50" x2="50" y2="30" stroke="#00ff66" stroke-width="3.5" stroke-linecap="round" transform="rotate(210, 50, 50)" />
                                        <!-- Minute hand at 2 (10 mins -> 60 deg) -->
                                        <line x1="50" y1="50" x2="50" y2="20" stroke="#00ff66" stroke-width="2" stroke-linecap="round" transform="rotate(60, 50, 50)" />
                                        <circle cx="50" cy="50" r="4" fill="#00ff66" />
                                    </svg>
                                    <div style="font-size: 0.85rem; margin-top: 10px; color: #00e5ff; font-weight: 600;">COORDENADA BETA</div>
                                    <div style="font-size: 0.75rem; color: #00ff66; opacity: 0.8; margin-top: 2px;">Fecha del Evento (10/07)</div>
                                </div>
                            </div>
                        `;
                        break;
                    case 'clave':
                        if (!arg) {
                            responseDiv.innerHTML = `<span style="color: #ffcc00;">[WARN] Debes especificar la palabra secreta. Ej: 'clave hola'</span>`;
                        } else if (btoa(arg.toLowerCase()) === 'c3BhY2U=') {
                            responseDiv.innerHTML = `
                                <div style="border: 1px solid #00ff66; padding: 1.5rem; border-radius: 6px; background: rgba(0, 255, 102, 0.05); box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); margin-top: 0.5rem;">
                                    <div style="color: #ffffff; font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; text-shadow: 0 0 10px #00ff66;">[ÉXITO] ¡ACCESO AL SISTEMA CONCEDIDO!</div>
                                    <div style="color: #00ff66; line-height: 1.6;">
                                        Has descifrado la palabra secreta del archivo de DDU 2026. 
                                        El próximo gran capítulo de Distamus nos llevará más allá del cielo. 
                                        Prepárate para el viaje al cosmos profundo.
                                    </div>
                                </div>
                            `;
                        } else {
                            responseDiv.innerHTML = `<span style="color: #ff3333;">[ERROR] Clave incorrecta. Inténtalo de nuevo.</span>`;
                        }
                        break;
                    case 'limpiar':
                        logContainer.innerHTML = '';
                        return;
                    case 'salir':
                        window.location.href = 'next-chapter.html';
                        return;
                    default:
                        responseDiv.innerHTML = `<span style="color: #ff3333;">Comando no reconocido: '${command}'. Escribe 'ayuda' para ver la lista de comandos disponibles.</span>`;
                }

                logContainer.appendChild(responseDiv);

                // Auto scroll to bottom
                const container = logContainer.parentElement;
                container.scrollTop = container.scrollHeight;
            }
        });
    </script>
</body>
</html>
